services:
  trino:
    image: trinodb/trino:469
    ports:
      - "18082:8080"
    volumes:
      - ../_shared/trino/etc:/etc/trino:ro

  airflow:
    image: apache/airflow:2.10.5-python3.11
    command: standalone
    environment:
      AIRFLOW_UID: "50000"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: openaegis-demo
    ports:
      - "18083:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_home:/opt/airflow

  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: openaegis
      MINIO_ROOT_PASSWORD: openaegis-demo
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data

  grafana:
    image: grafana/grafana-oss:11.5.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: openaegis-demo
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "13002:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  airflow_home:
  minio_data:
  grafana_data:
