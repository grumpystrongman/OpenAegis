global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: redpanda
    static_configs:
      - targets:
          - redpanda:9644

  - job_name: opa
    metrics_path: /metrics
    static_configs:
      - targets:
          - opa:8181
